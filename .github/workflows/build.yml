name: build-news-rss

on:
  schedule:
    # GitHub Actions は UTC。無料枠の cron は混雑時に遅延・スキップされるため、
    # 朝に3回リトライして取りこぼしを防ぐ。Slack投稿は下のガードで1日1回だけに制御。
    - cron: "15 0 * * *"   # 9:15 JST
    - cron: "45 0 * * *"   # 9:45 JST
    - cron: "15 1 * * *"   # 10:15 JST
  workflow_dispatch:
    inputs:
      force_slack:
        description: "重複ガードを無視してSlackに必ず投稿（手動テスト用）"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を避ける
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install -r requirements.txt

      - name: build feeds
        env:
          # Pages の公開URL（自分のユーザー名/リポジトリ名に合わせて自動設定）
          SITE_URL: ${{ format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          # AIキーは Secrets から注入。未登録ならキーワードモードで動作（エラーにならない）。
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python aggregator.py

      # --- Slack は1日1回だけ投稿（3回リトライしても重複しない）---
      - name: compute JST date
        id: jst
        run: echo "date=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_OUTPUT"

      - name: restore daily post marker
        id: marker
        uses: actions/cache@v4
        with:
          path: .slack-posted
          key: slack-posted-${{ steps.jst.outputs.date }}

      - name: post to Slack (once per day)
        if: steps.marker.outputs.cache-hit != 'true' || github.event.inputs.force_slack == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python slack_notify.py
          echo "$(TZ=Asia/Tokyo date +%FT%T%z)" > .slack-posted

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
