      - 第三者割当
      - ラウンド
      - 増資
      - 設立
      - 会社設立
      - 法人設立
      - 新会社
      - 子会社
      - 上場
      - IPO
      - 新規上場
      - M&A
      - 買収
      - 合併
      - 事業承継
      - 業務提携
      - 資本提携

  trend:          # 業界トレンド・市場ニュース
    label: "業界トレンド"
