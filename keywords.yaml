# カテゴリ自動分類用キーワード
# 記事タイトル＋本文要約にいずれかの語が含まれればそのカテゴリを付与（複数可）。
# 「営業候補(eigyo)」は shutten / shikin に該当した記事を自動集約します（このファイルでは定義不要）。

# NGワード：タイトルにこれらが含まれる記事は「営業候補（出店・資金調達）」から外す。
# 周年イベント・グッズ販売・コラボ等の“新店ではないノイズ”を除くため（AIなしでも効く）。
exclude:
  - 周年
  - グッズ
  - ノベルティ
  - コラボ
  - 限定発売
  - 再登場
  - プレゼント

categories:
  shutten:        # 新規出店・開業
    label: "新規出店"
    keywords:
      - 出店
      - オープン
      - 開業
      - 開店
      - 新店舗
      - 新店
      - 1号店
      - 一号店
      - 旗艦店
      - フラッグシップ
      - グランドオープン
      - 新装開店
      - リニューアルオープン
      - 出店予定
      - 進出
      - 上陸

  shikin:         # 資金調達・新会社設立
    label: "資金調達"
    keywords:
      - 資金調達
      - シリーズA
      - シリーズB
      - シリーズC
      - プレシリーズ
